<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 115" fill="white">
  <!--
    Shamrock / 3-leaf clover icon — white fill, no stroke.
    Each leaf is built from two overlapping circles (heart-like shape).
    Works on any dark or green background.
  -->

  <!-- ══ TOP LEAF ══ -->
  <circle cx="44" cy="30" r="18"/>
  <circle cx="56" cy="30" r="18"/>

  <!-- ══ BOTTOM-LEFT LEAF ══ -->
  <circle cx="27" cy="55" r="18"/>
  <circle cx="36" cy="45" r="18"/>

  <!-- ══ BOTTOM-RIGHT LEAF ══ -->
  <circle cx="73" cy="55" r="18"/>
  <circle cx="64" cy="45" r="18"/>

  <!-- Center fill to clean up the overlap gap -->
  <circle cx="50" cy="50" r="10"/>

  <!-- ══ STEM ══ -->
  <path d="M50 66 Q46 82 40 95" stroke="white" stroke-width="5" stroke-linecap="round" fill="none"/>
</svg>
